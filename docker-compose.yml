version: '29.1.2'

services:
  database:
    image: 'mysql:latest'
    container_name: mysql-bodega
    ports:
      - '3308:3306'
    environment:
      MYSQL_ROOT_PASSWORD: ''
      MYSQL_DATABASE: 'bodega'
    volumes:
      - 'db-data:/var/lib/mysql'
    networks:
      - red-bodega

networks:
  red-bodega:
    driver: bridge

volumes:
  db-data:
    driver: local


